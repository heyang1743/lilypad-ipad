name: Build unsigned iPad IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-unsigned:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned device app
        run: |
          xcodebuild \
            -project LilyPad.xcodeproj \
            -scheme LilyPad \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          rm -rf Payload LilyPad-unsigned.ipa
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/LilyPad.app Payload/
          zip -qry LilyPad-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LilyPad-unsigned-ipa
          path: LilyPad-unsigned.ipa
